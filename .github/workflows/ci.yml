name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indiaadvertising
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build --if-present

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: india-advertising-node
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install deps
        run: npm ci
      - name: Lint (if configured)
        run: |
          if [ -f package.json ] && grep -q "lint" package.json; then npm run lint || true; fi
